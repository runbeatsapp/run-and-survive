<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>La Buenna Running App | UI-Supervivencia</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Leaflet Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
</head>
<body>
    <div id="app">
        <!-- HUD: STATUS BARS & RESOURCES -->
        <header id="hud">
            <div class="status-bars">
                <!-- Salud -->
                <div class="status-item">
                    <div class="status-label"><span>Salud</span><span id="val-health">100%</span></div>
                    <div class="bar-container"><div id="bar-health" class="bar-fill bar-health" style="width: 100%;"></div></div>
                </div>
                <!-- Agua -->
                <div class="status-item">
                    <div class="status-label"><span>Agua</span><span id="val-water">80%</span></div>
                    <div class="bar-container"><div id="bar-water" class="bar-fill bar-water" style="width: 80%;"></div></div>
                </div>
                <!-- Comida -->
                <div class="status-item">
                    <div class="status-label"><span>Comida</span><span id="val-food">80%</span></div>
                    <div class="bar-container"><div id="bar-food" class="bar-fill bar-food" style="width: 80%;"></div></div>
                </div>
            </div>

            <div class="resource-grid">
                <div class="res-item">
                    <span class="res-icon">🪵</span>
                    <span id="res-wood" class="res-val">0</span>
                </div>
                <div class="res-item">
                    <span class="res-icon">⚙️</span>
                    <span id="res-metal" class="res-val">0</span>
                </div>
                <div class="res-item">
                    <span class="res-icon">🔩</span>
                    <span id="res-scraps" class="res-val">0</span>
                </div>
            </div>
        </header>

        <!-- MAIN VIEWS -->
        <main id="main-content">
            
            <!-- SECTION: SUPERVIVENCIA (DASHBOARD) -->
            <section id="view-survival" class="view-section active">
                <!-- Monitor de la Radio -->
                <div id="radio-monitor" style="min-height: 80px; padding: 0.5rem;">
                    <div id="event-log" style="font-size: 0.7rem; height: 70px;">
                        <!-- Mensajes de narrativa aquí -->
                    </div>
                </div>

                <div id="mapa-gps" style="width: 100%; height: 300px; border: 1px solid var(--secondary); margin: 10px 0; position: relative; overflow: hidden; border-radius: 8px;">
                    
                    <!-- Datos de Carrera (Flotando en la parte superior) -->
                    <div id="run-data" style="display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(20, 20, 23, 0.7); backdrop-filter: blur(4px); padding: 0.5rem 1rem; z-index: 1002; border-bottom: 1px solid rgba(0, 255, 65, 0.3); display: flex; justify-content: space-between; align-items: center;">
                        <span id="run-km" style="font-size: 1.2rem; font-family: var(--font-mono); font-weight: bold; color: var(--secondary);">0.00 km</span>
                        <span id="run-time" style="font-family: var(--font-mono); color: var(--text-med); font-size: 0.8rem;">00:00</span>
                    </div>

                    <!-- Controles de Sesión Activa (Superpuestos en la parte inferior) -->
                    <div id="controles-sesion" style="display:none; flex-direction: column; gap: 0.5rem; position: absolute; bottom: 10px; left: 10px; right: 10px; z-index: 1001;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                            <button id="btn-pausa" class="btn-large" style="height: 50px; border-color: var(--accent); color: var(--accent); background: rgba(20, 20, 23, 0.8); backdrop-filter: blur(4px); font-size: 0.8rem;">
                                PAUSA
                            </button>
                            <button id="btn-terminar" class="btn-large huida" style="height: 50px; border-color: #ff0000; color: #ff0000; font-size: 0.6rem; background: rgba(20, 20, 23, 0.8); backdrop-filter: blur(4px);">
                                TERMINAR (HOLD)
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Botones de Acción -->
                <div class="action-buttons">
                    <button id="btn-explorar" class="btn-large explorar">
                        <span class="label">Paso Lento</span>
                        MODO EXPLORADOR
                    </button>
                    <button id="btn-huida" class="btn-large huida">
                        <span class="label">Sprints / Huida</span>
                        MODO HUIDA
                    </button>
                </div>
            </section>

            <!-- SECTION: MI REFUGIO (CONSTRUCCIÓN) -->
            <section id="view-shelter" class="view-section">
                <div class="base-viewport">
                    <div id="pixel-art-placeholder" style="text-align: center; opacity: 0.5;">
                        <span style="font-size: 3rem;">🏚️</span>
                        <p style="font-size: 0.7rem; margin-top: 1rem; text-transform: uppercase;">Zona de Construcción<br>[Espacio para Pixel Art]</p>
                    </div>
                    <div id="base-status" style="margin-top: 1rem; width: 100%; padding: 0 1rem;"></div>
                </div>
            </section>

            <!-- SECTION: DIARIO (ESTADÍSTICAS) -->
            <section id="view-journal" class="view-section">
                <h2 style="font-size: 0.8rem; text-transform: uppercase; color: var(--primary); margin-bottom: 1rem;">Historial de Incursiones</h2>
                <div id="journal-list">
                    <!-- Tarjetas de historial aquí -->
                </div>
            </section>

        </main>

        <!-- FOOTER: NAVEGACIÓN -->
        <footer>
            <button class="nav-tab active" data-view="survival">
                <i>🛡️</i>
                <span>Supervivencia</span>
            </button>
            <button class="nav-tab" data-view="shelter">
                <i>🏠</i>
                <span>Mi Refugio</span>
            </button>
            <button class="nav-tab" data-view="journal">
                <i>📖</i>
                <span>Diario</span>
            </button>
        </footer>
    </div>

    <!-- Scripts -->
    <!-- Leaflet Script -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="narrativa.js"></script>
    <script src="gps.js"></script>
    <script src="running.js"></script>
    <script src="base.js"></script>
    <script src="main.js"></script>
</body>
</html>
